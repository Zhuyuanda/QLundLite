name: srj-training
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip

  # PyTorch CPU-only (laptop default)
  - pytorch::pytorch>=2.0
  - pytorch::cpuonly

  # To use a GPU instead, remove the two lines above and uncomment:
  # - pytorch::pytorch>=2.0
  # - pytorch::pytorch-cuda=12.1   # adjust CUDA version to match your driver

  # Core scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pandas>=2.0
  - tqdm>=4.65
  - networkx>=3.0
  - pyyaml>=6.0

  - pip:
      - torch-geometric>=2.4
      - uproot>=5.0
      - awkward>=2.0
      # - pennylane>=0.35   # optional: only needed for QLundNet
