# ================================================================
# SRJ Signal Config
# Truth-label definitions and kinematic selection for SRJ jets.
# ================================================================

srj:
  # Signal: light quarks (u/d/s), charm, bottom
  signal_jet_truth_labels: [1, 2, 3, 4, 5]
  # Background: unknown/gluon
  background_jet_truth_labels: [-1, 21]

  dsids: []        # No DSID-based splitting for SRJ
  skip_dsids: []

  # SRJ jet kinematic cuts (applied in preprocess_SRJ_CPU.py)
  pt_range: [20, 160]       # GeV
  mass_range: [0, .inf]

  # Absolute eta cut (forward SRJ jets)
  eta_min: 3.2
  eta_max: 4.5

  # Minimum number of Lund-plane splittings to keep a jet
  min_splits: 3

  # Histogram files for pT reweighting (unused for SRJ — done at preprocess stage)
  pt_hist_files_bkg:
    dir_path: ""
    files: {}
  pt_hist_files_signal: {}
